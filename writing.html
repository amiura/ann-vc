<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing | Ann Miura-Ko</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <nav class="top-nav">
        <div class="container">
            <a href="index.html" class="nav-brand">AMK</a>
            <div class="nav-links">
                <a href="about.html">About</a>
                <a href="investments.html">Investments</a>
                <a href="books.html">Books</a>
                <a href="writing.html" class="active">Writing</a>
                <a href="index.html#contact">Contact</a>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 class="fade-in">Writing</h1>
            <p class="page-subtitle fade-in">Essays on venture, founders, technology, and life.</p>
        </div>
    </header>

    <section class="posts page-posts">
        <div class="container">
            <div class="posts-grid" id="posts-grid"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="social-links">
                    <a href="https://annimaniac.substack.com" target="_blank">Substack</a>
                    <a href="https://twitter.com/annimaniac" target="_blank">X / Twitter</a>
                    <a href="https://www.linkedin.com/in/amiura/" target="_blank">LinkedIn</a>
                </div>
                <p class="copyright">&copy; 2026 Ann Miura-Ko</p>
            </div>
        </div>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    setTimeout(() => entry.target.classList.add('visible'), index * 80);
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // Load all posts from Substack RSS
        const FEED_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fannimaniac.substack.com%2Ffeed';
        const postsGrid = document.getElementById('posts-grid');

        function extractImage(html) {
            const m = html.match(/<img[^>]+src="([^"]+)"/);
            return m ? m[1] : null;
        }

        function extractExcerpt(html, len) {
            const text = html.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
            return text.length > len ? text.substring(0, len).replace(/\s\S*$/, '') + '…' : text;
        }

        fetch(FEED_URL)
            .then(r => r.json())
            .then(data => {
                data.items.forEach(item => {
                    const img = item.thumbnail || extractImage(item.content || item.description) || '';
                    const excerpt = extractExcerpt(item.description || item.content || '', 200);
                    const tag = (item.categories && item.categories[0]) || '';

                    const article = document.createElement('article');
                    article.className = 'post-card fade-in';
                    article.innerHTML = `
                        <div class="post-image">
                            <img src="${img}" alt="${item.title}">
                        </div>
                        <div class="post-content">
                            ${tag ? `<span class="post-tag">${tag}</span>` : ''}
                            <h3>${item.title}</h3>
                            <p>${excerpt}</p>
                            <a href="${item.link}" target="_blank" class="read-more">Read More &rarr;</a>
                        </div>
                    `;
                    postsGrid.appendChild(article);
                });
                postsGrid.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
            });
    </script>

</body>
</html>
